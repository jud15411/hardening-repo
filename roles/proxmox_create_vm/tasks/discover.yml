
- name: Query Proxmox for VM details
  community.general.proxmox_vm_info:
    api_user: "{{ proxmox_user }}"
    api_token_id: "{{ proxmox_token_id }}"
    api_token_secret: "{{ proxmox_token_secret }}"
    api_host: "{{ proxmox_host }}"
    node: "{{ proxmox_node }}"
    vmid: "{{ vm.vmid }}"
  register: vm_info

- name: Wait for VM to report IPv4
  community.general.proxmox_vm_info:
    api_user: "{{ proxmox_user }}"
    api_token_id: "{{ proxmox_token_id }}"
    api_token_secret: "{{ proxmox_token_secret }}"
    api_host: "{{ proxmox_host }}"
    node: "{{ proxmox_node }}"
    vmid: "{{ vm.vmid }}"
  register: vm_info
  until: >
    vm_info.vms[0].guest_interfaces is defined and
    (
      vm_info.vms[0].guest_interfaces
      | map(attribute='ip-addresses')
      | flatten
      | selectattr('ip-address-type', 'equalto', 'ipv4')
      | rejectattr('ip-address', 'match', '^127\\.')
      | list
      | length
    ) > 0
  retries: 30
  delay: 10

- name: Extract VM IPv4
  set_fact:
    vm_ipv4: >-
      {{
        vm_info.vms[0].guest_interfaces
        | map(attribute='ip-addresses')
        | flatten
        | selectattr('ip-address-type', 'equalto', 'ipv4')
        | rejectattr('ip-address', 'match', '^127\\.')
        | map(attribute='ip-address')
        | first
      }}

- name: Add VM to runtime inventory
  set_fact:
    runtime_inventory: >-
      {{
        runtime_inventory
        | combine({
            'all': {
              'children': {
                vm.os: {
                  'hosts': {
                    vm.name: {
                      'ansible_host': vm_ipv4,
                      'ansible_user': (vm.os == 'windows')
                        | ternary('Administrator', 'ansible')
                    }
                  }
                }
              }
            }
          }, recursive=True)
      }}
