
- name: Query Proxmox for VM details
  community.general.proxmox_vm_info:
    api_user: "{{ proxmox_user }}"
    api_token_id: "{{ proxmox_token_id }}"
    api_token_secret: "{{ proxmox_token_secret }}"
    api_host: "{{ proxmox_host }}"
    node: "{{ proxmox_node }}"
    vmid: "{{ vm.vmid }}"
  register: vm_info


- name: DEBUG Proxmox VM info
  debug:
    var: vm_info







- name: Query VM IP via QEMU guest agent (via Proxmox node 1)
  command: >
    qm agent {{ vm.vmid }} network-get-interfaces
  delegate_to: proxmox01
  register: qm_agent_output
  until: >
    qm_agent_output.stdout | length > 0 and
    (
      qm_agent_output.stdout
      | from_json
      | map(attribute='ip-addresses')
      | flatten
      | selectattr('ip-address-type', 'equalto', 'ipv4')
      | rejectattr('ip-address', 'match', '^127\\.')
      | list
      | length
    ) > 0
  retries: 60
  delay: 10



- name: Extract VM IPv4 address
  set_fact:
    vm_ipv4: >-
      {{
        qm_agent_output.stdout
        | from_json
        | map(attribute='ip-addresses')
        | flatten
        | selectattr('ip-address-type', 'equalto', 'ipv4')
        | rejectattr('ip-address', 'match', '^127\\.')
        | map(attribute='ip-address')
        | list
        | first
      }}



- name: Add VM to runtime inventory
  set_fact:
    runtime_inventory: >-
      {{
        runtime_inventory
        | combine({
            'all': {
              'children': {
                vm.os: {
                  'hosts': {
                    vm.name: {
                      'ansible_host': vm_ipv4,
                      'ansible_user': (vm.os == 'windows')
                        | ternary('Administrator', 'ansible')
                    }
                  }
                }
              }
            }
          }, recursive=True)
      }}
