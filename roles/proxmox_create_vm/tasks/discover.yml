
- name: Query Proxmox for VM details
  community.general.proxmox_vm_info:
    api_user: "{{ proxmox_user }}"
    api_token_id: "{{ proxmox_token_id }}"
    api_token_secret: "{{ proxmox_token_secret }}"
    api_host: "{{ proxmox_host }}"
    node: "{{ proxmox_node }}"
    vmid: "{{ vm.vmid }}"
  register: vm_info


- name: DEBUG Proxmox VM info
  debug:
    var: vm_info


- name: Wait for VM to be running
  command: /usr/sbin/qm status {{ vm.vmid }}
  delegate_to: 192.168.100.2
  vars:
    ansible_connection: ssh
  register: vm_status
  until: "'running' in vm_status.stdout"
  retries: 30
  delay: 5



- name: Query VM IP via QEMU guest agent (CLI)
  shell: >
    /usr/sbin/qm agent {{ vm.vmid }} network-get-interfaces
  delegate_to: 192.168.100.2
  vars:
    ansible_connection: ssh
  register: qm_agent_output
  until: >
    qm_agent_output.rc == 0 and
    (
      qm_agent_output.stdout
      | from_json
      | json_query('result[]."ip-addresses"[? "ip-address-type"==`ipv4` && !"127.0.0.1".contains(@."ip-address")]')
      | length
    ) > 0
  retries: 60
  delay: 10



- name: Extract VM IPv4 address
  set_fact:
    vm_ipv4: >-
      {{
        qm_agent_output.stdout
        | from_json
        | json_query(
            'result[]."ip-addresses"[? "ip-address-type"==`ipv4` && !"127.0.0.1".contains(@."ip-address")]."ip-address"'
          )
        | first
      }}


- name: DEBUG extracted IP
  debug:
    msg: "Discovered IP for {{ vm.name }}: {{ vm_ipv4 }}"



- name: Add VM to runtime inventory
  set_fact:
    runtime_inventory: >-
      {{
        runtime_inventory
        | combine({
            'all': {
              'children': {
                vm.os: {
                  'hosts': {
                    vm.name: {
                      'ansible_host': vm_ipv4,
                      'ansible_user': (vm.os == 'windows')
                        | ternary('Administrator', 'ansible')
                    }
                  }
                }
              }
            }
          }, recursive=True)
      }}
