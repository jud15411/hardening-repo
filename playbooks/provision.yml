
- name: Provision VMs on Proxmox
  hosts: localhost
  connection: local
  gather_facts: false

  vars_files:
    - ../inventories/vms.yml

  tasks:
    - name: Initialize runtime inventory
      set_fact:
        runtime_inventory:
          all:
            children:
              linux:
                hosts: {}
              windows:
                hosts: {}

    - name: Create all defined VMs
      include_role:
        name: proxmox_create_vm
        tasks_from: create.yml
      loop: "{{ vms }}"
      loop_control:
        loop_var: vm

    - name: Discover VM IPs and build inventory
      include_role:
        name: proxmox_create_vm
        tasks_from: discover.yml
      loop: "{{ vms }}"
      loop_control:
        loop_var: vm

    - name: Write runtime inventory file
      copy:
        dest: ../inventories/runtime.yml
        content: "{{ runtime_inventory | to_nice_yaml }}"
