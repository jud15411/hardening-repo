
#############################
# PLAY 1 — PROVISION VMs
#############################
- name: Provision VMs on Proxmox
  hosts: localhost
  connection: local
  gather_facts: false

  vars_files:
    - ../inventories/vms.yml
    - ../inventories/proxmox_host.yml

  tasks:
    - name: Initialize runtime inventory
      set_fact:
        runtime_inventory:
          all:
            children:
              linux:
                hosts: {}
              windows:
                hosts: {}

    - name: Create all VMs
      include_role:
        name: proxmox_create_vm
        tasks_from: create.yml
      loop: "{{ vms }}"
      loop_control:
        loop_var: vm

    - name: Discover VM IPs and build runtime inventory
      include_role:
        name: proxmox_create_vm
        tasks_from: discover.yml
      loop: "{{ vms }}"
      loop_control:
        loop_var: vm

    - name: Write runtime inventory to disk
      copy:
        dest: ../inventories/runtime.yml
        content: "{{ runtime_inventory | to_nice_yaml }}"

#############################
# PLAY 2 — CIS-CAT ASSESSMENT
#############################
- name: CIS-CAT Level 1 Baseline Assessment
  hosts: all
  gather_facts: true

  roles:
    - cis_cat
